name: Build Bharat Samvad

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run build
        run: python scripts/build_from_markdown_google_translate.py

      - name: Commit generated HTML
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add -A *.html scripts/.translations-cache/ || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Auto-build articles [skip ci]"
            git push
          fi
