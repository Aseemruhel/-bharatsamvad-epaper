name: Build Bharat Samwad (from Word docs)

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pandoc (Word reader)
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install Python deps
        run: pip install --quiet googletrans==4.0.0rc1 httpx==0.13.3

      - name: Run build
        run: python scripts/build_from_docx.py

      - name: Commit generated HTML
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add -A *.html scripts/.translations-cache/ || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Auto-build articles from Word docs [skip ci]"
            git push
          fi
